# DocuRidge — nginx upstream snippet.
#
# Drop into the existing proxy's nginx config (e.g. inside the
# `server { listen 443 ssl; ... }` block in /projects/proxy/nginx/nginx.conf).
# Reload nginx after install: `docker exec proxy nginx -s reload`.
#
# Prerequisites (one-time):
#   1. The `proxy` container must be attached to the `docuridge_proxy_net`
#      network. Edit /projects/proxy/docker-compose.yml to add:
#
#          networks:
#            - <existing networks>
#            - docuridge_proxy_net
#
#          networks:
#            <existing>: ...
#            docuridge_proxy_net:
#              external: true
#
#      Then recreate proxy: `cd /projects/proxy && docker compose up -d`.
#
#   2. Verify the app container is reachable from within proxy:
#          docker exec proxy wget -qO- http://docuridge_app:3000/DocuRidge/healthz
#
# This snippet uses the same patterns as other apps on this host: dynamic
# upstream resolution via Docker DNS, large client_max_body_size for PDF
# uploads, WebSocket upgrade headers for live status updates.
#
# Path: /DocuRidge (case-sensitive). A redirect handles the no-trailing-slash
# case; case-variant redirects send /docuridge, /DOCURIDGE, etc. to /DocuRidge/.

# Redirect canonical-case-insensitive variants to /DocuRidge/.
location ~* ^/docuridge/?$ {
    return 301 /DocuRidge/;
}

# No-trailing-slash: redirect /DocuRidge to /DocuRidge/.
location = /DocuRidge {
    return 301 /DocuRidge/;
}

# Main proxy block.
location /DocuRidge/ {
    set $docuridge_app docuridge_app:3000;

    # Body size for PDF uploads (overrides global if smaller).
    client_max_body_size 50m;

    proxy_pass http://$docuridge_app;
    proxy_http_version 1.1;

    # WebSocket / SSE upgrade — used by signing-page live status.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';

    # Forwarded headers — the app trusts these to derive real client IP,
    # original protocol, and absolute URL building.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /DocuRidge;

    # Timeouts: long enough for PDF processing on big documents.
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;

    # Don't cache app responses.
    proxy_cache_bypass $http_upgrade;
    proxy_no_cache 1;
}
