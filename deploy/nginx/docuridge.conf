# DocuRidge — nginx upstream snippet.
#
# Two pieces:
#   1. Two `map` blocks at the top of the `http {}` scope (alongside the AIF
#      maps) that detect non-canonical case variants of the path.
#   2. A handful of location blocks inside the `server { listen 443 ssl; ... }`
#      block, BEFORE the catch-all `location /` portal block.
#
# Path: /DocuRidge (case-sensitive). Canonical-case requests pass through
# to the app. Non-canonical-case variants (/docuridge, /DOCURIDGE, etc.)
# are redirected with a 301 to the canonical case.
#
# IMPORTANT: Next.js strips trailing slashes internally (default behavior).
# That means /DocuRidge/ → 308 → /DocuRidge from the upstream. If nginx
# also redirects /DocuRidge → /DocuRidge/, those two ping-pong forever and
# the browser bails out with ERR_TOO_MANY_REDIRECTS. The fix is to forward
# BOTH /DocuRidge and /DocuRidge/ directly to upstream — same approach
# legisview uses on this proxy.
#
# Prerequisites (one-time):
#   * The `proxy` container is attached to `docuridge_proxy_net`. See
#     /projects/proxy/docker-compose.yml — the network is declared as
#     `external: true` referencing the network name `docuridge_proxy_net`.
#   * Verify the app container is reachable from inside proxy:
#       docker exec proxy wget -qO- http://docuridge_app:3000/DocuRidge/healthz

# ─── Add inside `http { ... }`, near the existing AIF maps ────────────────
#
# map $uri $docuridge_needs_redirect {
#     default 0;
#     "~^/DocuRidge"  0;     # canonical case → no redirect
#     "~*^/docuridge" 1;     # any other case → redirect
# }
# map $uri $docuridge_redirect {
#     default "";
#     "~*^/docuridge(/.*)?$" "/DocuRidge$1";
# }

# ─── Add inside `server { listen 443 ssl; ... }`, before `location /` ────
#
# # DocuRidge — case-canonicalisation
# if ($docuridge_needs_redirect) {
#     return 301 $docuridge_redirect;
# }
#
# # /DocuRidge and /DocuRidge/ both forwarded directly — Next strips the
# # trailing slash itself, so a 301 here would loop with that.
# location = /DocuRidge {
#     set $docuridge_app docuridge_app:3000;
#     client_max_body_size 50m;
#     proxy_pass http://$docuridge_app;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_set_header X-Forwarded-Host $host;
#     proxy_set_header X-Forwarded-Prefix /DocuRidge;
# }
# location = /DocuRidge/ {
#     set $docuridge_app docuridge_app:3000;
#     client_max_body_size 50m;
#     proxy_pass http://$docuridge_app;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_set_header X-Forwarded-Host $host;
#     proxy_set_header X-Forwarded-Prefix /DocuRidge;
# }
